name: PR CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr_body_test_plan:
    name: PR Body Test Plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate required preview test plan in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body || '';
            const missing = [];

            if (!body.includes('## Live Preview Test Plan')) {
              missing.push('`## Live Preview Test Plan` section');
            }
            if (!/Preview URL:/i.test(body)) {
              missing.push('`Preview URL:` field');
            }
            if (!/^\s*1\.\s+/m.test(body)) {
              missing.push('at least one numbered execution step');
            }

            if (missing.length > 0) {
              core.setFailed(
                `PR body is missing required live-preview test-plan fields: ${missing.join(', ')}.`
              );
            }

  typecheck:
    name: Typecheck
    needs: pr_body_test_plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Production Build
    needs: pr_body_test_plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
